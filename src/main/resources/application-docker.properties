# Docker profile overrides
# MySQL connects via Docker service name
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://mysql:3306/smart_parking_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:parking_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:parking_pass}

# Disable SQL logging in Docker
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Logging
logging.level.org.springframework=WARN
logging.level.com.parking=INFO
